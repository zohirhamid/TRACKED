version: "3.9"
services:
  web:
    build: .
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env

  # Optional Redis (enable if you want shared caching across processes/containers)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  # Then set: REDIS_URL=redis://localhost:6379/1
